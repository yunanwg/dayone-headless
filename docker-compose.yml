# Always-on MCP + periodic REST sync, sharing private mirror/media storage.
# Secret values are mounted as files; never use env_file for credentials.

services:
  sync:
    build: .
    image: dayone-headless
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop: [ALL]
    cap_add:
      # Root exists only in the entrypoint: read arbitrary-host-UID 0600 secret
      # mounts, stage them, then drop to bun with an empty capability set.
      - DAC_READ_SEARCH
      - CHOWN
      - SETUID
      - SETGID
      - SETPCAP
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    environment:
      DAYONE_MIRROR: /data/mirror.db
      DAYONE_MEDIA_DIR: /data/media
      DAYONE_ENCRYPTION_KEY_FILE: /run/secrets/dayone_encryption_key
      DAYONE_API_TOKEN_FILE: /run/secrets/dayone_api_token
      DAYONE_DEVICE_ID: ${DAYONE_DEVICE_ID:-}
      DAYONE_SYNC_INTERVAL: ${DAYONE_SYNC_INTERVAL:-3600}
      DAYONE_SYNC_MAX_STALENESS_SECONDS: ${DAYONE_SYNC_MAX_STALENESS_SECONDS:-86400}
      DAYONE_SYNC_CONCURRENCY: ${DAYONE_SYNC_CONCURRENCY:-}
      DAYONE_MEDIA_CONCURRENCY: ${DAYONE_MEDIA_CONCURRENCY:-}
      DAYONE_HTTP_TIMEOUT_MS: ${DAYONE_HTTP_TIMEOUT_MS:-60000}
    secrets:
      - dayone_encryption_key
      - dayone_api_token
    volumes:
      - mirror:/data
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /run/dayone-secrets:size=16k,mode=0700,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "/usr/local/bin/dayone-entrypoint", "health-sync"]
      interval: 5m
      timeout: 15s
      start_period: 45s
      retries: 3
    command: ["sync-loop"]

  mcp:
    image: dayone-headless
    depends_on:
      - sync
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop: [ALL]
    cap_add:
      - DAC_READ_SEARCH
      - CHOWN
      - SETUID
      - SETGID
      - SETPCAP
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    environment:
      DAYONE_MIRROR: /data/mirror.db
      DAYONE_MEDIA_DIR: /data/media
      DAYONE_MCP_PORT: "8477"
      DAYONE_MCP_HOST: "0.0.0.0"
      DAYONE_MCP_AUTH_MODE: ${DAYONE_MCP_AUTH_MODE:-none}
      DAYONE_MCP_ALLOWED_HOSTS: ${DAYONE_MCP_ALLOWED_HOSTS:-127.0.0.1:8477,localhost:8477}
      DAYONE_MCP_ALLOWED_ORIGINS: ${DAYONE_MCP_ALLOWED_ORIGINS:-}
      DAYONE_MCP_MAX_CONCURRENCY: ${DAYONE_MCP_MAX_CONCURRENCY:-8}
      DAYONE_CF_ACCESS_TEAM_DOMAIN: ${DAYONE_CF_ACCESS_TEAM_DOMAIN:-}
      DAYONE_CF_ACCESS_AUD: ${DAYONE_CF_ACCESS_AUD:-}
      DAYONE_MIRROR_WAIT: ${DAYONE_MIRROR_WAIT:-300}
    volumes:
      # SQLite WAL readers may need to create/open -wal/-shm sidecars. Keep the
      # volume writable; the serving code opens the DB readonly + query_only.
      - mirror:/data
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /run/dayone-secrets:size=16k,mode=0700,noexec,nosuid,nodev
    ports:
      - "127.0.0.1:8477:8477"
    healthcheck:
      test: ["CMD", "/usr/local/bin/dayone-entrypoint", "health-mcp"]
      interval: 5m
      timeout: 15s
      start_period: 45s
      retries: 3
    command: ["mcp"]

secrets:
  dayone_encryption_key:
    file: ${DAYONE_ENCRYPTION_KEY_SECRET_FILE:-./secrets/dayone_encryption_key}
  dayone_api_token:
    file: ${DAYONE_API_TOKEN_SECRET_FILE:-./secrets/dayone_api_token}

volumes:
  mirror:
