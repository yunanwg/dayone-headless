# dayone-headless — always-on MCP + periodic REST sync, sharing one mirror.
#
#   1. cp .env.example .env   # fill in DAYONE_ENCRYPTION_KEY + DAYONE_EMAIL/PASSWORD
#   2. docker compose up -d
#
# The `sync` service refreshes the mirror on an interval (incremental — cheap);
# the `mcp` service serves it read-only over streamable-HTTP. Expose `mcp` behind
# a Cloudflare Access tunnel (like the OmniFocus bridge) — do NOT publish it raw.

services:
  sync:
    build: .
    image: dayone-headless
    restart: unless-stopped
    env_file: .env
    environment:
      DAYONE_MIRROR: /data/mirror.db
    volumes:
      - mirror:/data
    # Incremental sync every DAYONE_SYNC_INTERVAL seconds (default 1h).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do bun run src/serve/cli.ts sync || echo "sync failed; retrying next cycle"; sleep "${DAYONE_SYNC_INTERVAL:-3600}"; done'

  mcp:
    image: dayone-headless
    depends_on:
      - sync
    restart: unless-stopped
    # NO env_file here: the read-only server only reads the mirror, so it must not
    # hold the encryption key / account password. Only `sync` needs those.
    environment:
      DAYONE_MIRROR: /data/mirror.db
      DAYONE_MCP_PORT: "8477"
      # Bind inside the container to all interfaces so the published port works; the
      # host mapping below keeps the actual exposure on loopback (127.0.0.1).
      DAYONE_MCP_HOST: "0.0.0.0"
    volumes:
      - mirror:/data
    # Host exposure is loopback only; front it with cloudflared + CF Access remotely.
    ports:
      - "127.0.0.1:8477:8477"
    command: ["mcp"]

volumes:
  mirror:
