name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Token optimization: only auto-review code/config changes. Docs-only PRs can
    # still be reviewed on demand by commenting @claude.
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "Dockerfile"
      - ".github/workflows/**"

# Default-deny; the job widens only what it needs.
permissions: {}

concurrency:
  # A new push to the PR cancels the superseded review — saves tokens.
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Don't review drafts; wait until the PR is marked ready.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.3.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # auto-scoped token, not a PAT
          # This repo decrypts a private journal — keep file contents out of logs.
          show_full_output: false
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
