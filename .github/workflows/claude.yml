name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Default-deny; the job widens only what it needs.
permissions: {}

concurrency:
  # One Claude run per issue/PR thread. Do NOT cancel an in-progress run — it may
  # be mid-task; just avoid duplicate parallel runs on the same thread.
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Bound cost / runaway; a normal task finishes well under this.
    timeout-minutes: 20
    # claude-code-action only triggers for users with write access by default, so
    # these stay read-only — Claude posts via its own app credentials.
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.3.0
        with:
          fetch-depth: 1

      - name: Set up Bun (repo toolchain, so Claude can run checks when asked)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version: latest

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # auto-scoped token, not a PAT

          # This repo decrypts a private journal — never spill file contents or
          # command output into public Action logs.
          show_full_output: false

          # Let Claude read CI results on PRs.
          additional_permissions: |
            actions: read

          # Optional: pin a model, or restrict tools, e.g.
          # claude_args: '--allowedTools "Bash(bun *),Bash(gh pr *)"'
