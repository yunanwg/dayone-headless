name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

jobs:
  image:
    name: build · push · sign
    runs-on: ubuntu-latest
    # Gate through the `release` environment (only v* tags may deploy to it; add a
    # required reviewer there once the repo is public for a manual release gate).
    environment: release
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.3.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true # generate an SBOM
          provenance: mode=max # build provenance attestation
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign the image (keyless)
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
