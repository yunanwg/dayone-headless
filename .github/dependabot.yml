# Keep SHA-pinned GitHub Actions current, so pinning for supply-chain safety
# doesn't mean running stale, unpatched actions.
#
# Note: no `npm` ecosystem here on purpose — Dependabot updates package.json but
# does not keep Bun's `bun.lock` in sync, which breaks `bun install --frozen-
# lockfile` in CI. Bump JS deps manually with `bun update`.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]
