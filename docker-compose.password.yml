# Optional override for password-based token minting.
# Use with: docker compose -f docker-compose.yml -f docker-compose.password.yml up -d

services:
  sync:
    environment:
      DAYONE_API_TOKEN_FILE: !reset null
      DAYONE_EMAIL_FILE: /run/secrets/dayone_email
      DAYONE_PASSWORD_FILE: /run/secrets/dayone_password
    secrets: !override
      - dayone_encryption_key
      - dayone_email
      - dayone_password

secrets:
  dayone_email:
    file: ${DAYONE_EMAIL_SECRET_FILE:-./secrets/dayone_email}
  dayone_password:
    file: ${DAYONE_PASSWORD_SECRET_FILE:-./secrets/dayone_password}
